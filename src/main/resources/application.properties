server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/fastchickens
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jackson.serialization.write-dates-as-timestamps=false

# JWT — override app.jwt.secret in production via environment variable
# Secret must be at least 256 bits (32 bytes) for HS256.
# Generate with: openssl rand -base64 32
app.jwt.secret=${JWT_SECRET:change-me-in-production-min-32-chars!!}
app.jwt.access-token-expiry-seconds=900
app.jwt.refresh-token-expiry-seconds=604800
