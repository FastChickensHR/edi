services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fastchickens
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fastchickens"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "yarn install && yarn dev --host"
    ports:
      - "5173:5173"
    environment:
      - VITE_PROXY_TARGET=http://host.docker.internal:8081
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
